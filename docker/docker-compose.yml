version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: mes_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: mes_user
      POSTGRES_PASSWORD: mes_pass
      POSTGRES_DB: mes_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mes_user -d mes_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: mes_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@mes.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: ../backend
    container_name: mes_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://mes_user:mes_pass@postgres:5432/mes_db
      MES_RUNTIME_ROOT: /runtime
      # WS2 가드: 운영 표식. SQLite/DATABASE_URL 미설정 시 backend 기동 거부(fail-fast).
      APP_ENV: production
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # 경량 liveness: DB-down 시 /health/live 가 503 → unhealthy (정적 /health 아님).
      # python:slim 에 curl 없음 → urllib. 503/연결실패 시 예외→비0 종료.
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8010/health/live',timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    volumes:
      # 백업·로그·보고서 영속화 — 호스트의 표준 런타임 루트와 일치.
      - ../_attic/runtime:/runtime
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # 운영: Dockerfile CMD(uvicorn app.main:app :8010, --reload 없음) 사용.
    # 소스 bind-mount/--reload 금지(이미지에 구운 코드로 구동). 포트는 8010 통일
    # (backend/Dockerfile · next.config.js BACKEND_INTERNAL_URL 와 일치).
    # SECRET_KEY 제거: backend/app 어디서도 미참조(보안 오해 소지 placeholder).

  frontend:
    build: ../frontend
    container_name: mes_frontend
    restart: unless-stopped
    environment:
      # next.config.js rewrites(/api/:path*) 의 프록시 타깃.
      # compose 네트워크 내부에서 backend 서비스로 도달 (localhost 아님).
      BACKEND_INTERNAL_URL: http://backend:8010
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      # node:alpine 에 wget 존재. 비200/연결실패 시 비0 종료.
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    # 운영: Dockerfile CMD(npm run start, .next-prod 산출물) 사용.
    # next dev/소스 bind-mount 금지. NEXT_PUBLIC_API_URL 제거(next.config 미사용).

volumes:
  postgres_data:
