version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: erp_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: erp_user
      POSTGRES_PASSWORD: erp_pass
      POSTGRES_DB: erp_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U erp_user -d erp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  pgadmin:
    image: dpage/pgadmin4:latest
    container_name: erp_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@erp.local
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres

  backend:
    build: ../backend
    container_name: erp_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://erp_user:erp_pass@postgres:5432/erp_db
    ports:
      - "8010:8010"
    depends_on:
      postgres:
        condition: service_healthy
    # 운영: Dockerfile CMD(uvicorn app.main:app :8010, --reload 없음) 사용.
    # 소스 bind-mount/--reload 금지(이미지에 구운 코드로 구동). 포트는 8010 통일
    # (backend/Dockerfile · next.config.js BACKEND_INTERNAL_URL 와 일치).
    # SECRET_KEY 제거: backend/app 어디서도 미참조(보안 오해 소지 placeholder).

  frontend:
    build: ../frontend
    container_name: erp_frontend
    restart: unless-stopped
    environment:
      # next.config.js rewrites(/api/:path*) 의 프록시 타깃.
      # compose 네트워크 내부에서 backend 서비스로 도달 (localhost 아님).
      BACKEND_INTERNAL_URL: http://backend:8010
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # 운영: Dockerfile CMD(npm run start, .next-prod 산출물) 사용.
    # next dev/소스 bind-mount 금지. NEXT_PUBLIC_API_URL 제거(next.config 미사용).

volumes:
  postgres_data:
