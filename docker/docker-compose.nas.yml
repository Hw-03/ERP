version: "3.9"

services:
  backend:
    build: ../backend
    container_name: erp_backend
    restart: unless-stopped
    environment:
      DATABASE_URL: sqlite:////app/erp.db
    ports:
      - "8010:8010"
    volumes:
      - ../backend/erp.db:/app/erp.db
    # backend.command 제거 — backend/Dockerfile CMD 와 동일 (8010, no --reload).

  frontend:
    build: ../frontend
    container_name: erp_frontend
    restart: unless-stopped
    environment:
      BACKEND_INTERNAL_URL: http://backend:8010
    ports:
      - "3000:3000"
    depends_on:
      - backend
    # frontend.command — npm run start 만. 빌드는 frontend/Dockerfile RUN npm run build 에서 완료.
    command: npm run start
