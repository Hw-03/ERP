name: CI

on:
  push:
    branches: [main, "feat/**", "fix/**", "refactor/**"]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (pytest + compile + openapi-drift)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Compile check
        run: python -m compileall backend

      - name: Run pytest
        working-directory: backend
        run: pytest -q

      - name: OpenAPI drift check
        working-directory: backend
        run: |
          python -c "
          import sys, json
          sys.path.insert(0, '.')
          from app.main import app
          with open('/tmp/openapi-current.json', 'w', encoding='utf-8') as f:
              json.dump(app.openapi(), f, indent=2, sort_keys=True, ensure_ascii=False)
              f.write('\n')
          "
          diff -u ../_dev/baselines/openapi.json /tmp/openapi-current.json \
            && echo "[OK] OpenAPI spec matches baseline." \
            || (echo "" && echo "[FAIL] OpenAPI drift detected." \
                && echo "If this schema change is intentional, refresh the baseline and commit it:" \
                && echo "  cd backend && python -c \"from app.main import app; import json; open('../_dev/baselines/openapi.json','w',encoding='utf-8').write(json.dumps(app.openapi(),indent=2,sort_keys=True,ensure_ascii=False)+chr(10))\"" \
                && exit 1)

  frontend:
    name: Frontend (lint + tsc + vitest+coverage + build)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Cache .next/cache
        uses: actions/cache@v4
        with:
          path: frontend/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-${{ hashFiles('frontend/**/*.[jt]s', 'frontend/**/*.[jt]sx') }}
          restore-keys: |
            nextjs-${{ runner.os }}-${{ hashFiles('frontend/package-lock.json') }}-

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint:strict

      - name: Type check
        working-directory: frontend
        run: npx tsc --noEmit

      - name: Vitest (with coverage gate)
        working-directory: frontend
        run: npm run test:coverage

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-coverage
          path: frontend/coverage
          retention-days: 7

      - name: Build (Next.js production)
        working-directory: frontend
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Bundle size gate
        working-directory: frontend
        run: npm run check:bundle-size

  e2e:
    name: E2E (Playwright · 전용 DB)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install backend dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Install Playwright browser
        working-directory: frontend
        run: npx playwright install --with-deps chromium

      # globalSetup 이 전용 mes_e2e.db 부트스트랩·시드·백엔드(8021) 기동, webServer 가 next dev(3100).
      # 실 backend/mes.db 는 CI 체크아웃에 없음(.gitignore) → 해시 가드 자동 생략.
      - name: Playwright E2E
        working-directory: frontend
        run: npx playwright test
        env:
          NEXT_TELEMETRY_DISABLED: "1"

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: frontend/playwright-report
          retention-days: 7
